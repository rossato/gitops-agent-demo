---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-agent-hub-cluster
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    argocd-agent.argoproj-labs.io/agent-name: argocd-agent-hub
stringData:
  name: argocd-agent-hub
  server: https://argocd-agent-principal-resource-proxy.argocd.svc.cluster.local:9090?agentName=argocd-agent-hub
  config: |
    {
      "tlsClientConfig": {
          "insecure": false,
          "certData": "{{ (fromSecret "argocd" "argocd-principal-hub" "tls.crt") }}",
          "keyData": "{{ (fromSecret "argocd" "argocd-principal-hub" "tls.key") }}",
          "caData": "{{ (fromSecret "argocd" "argocd-principal-hub" "ca.crt") }}"
      }
    }
